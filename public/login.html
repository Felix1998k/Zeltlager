<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login</title><link rel="stylesheet" href="/style.css"></head><body><main class="login"><form class="panel" method="post" action="/admin/login"><h2>Adminbereich</h2><p>Bilder hochladen und Einmalcodes erstellen.</p><div id="message"></div><div class="form-row"><label for="password">Passwort</label><input id="password" name="password" type="password" autocomplete="current-password" required autofocus></div><button type="submit">Anmelden</button></form></main><script>const p=new URLSearchParams(location.search);const e=p.get('error');if(e)document.getElementById('message').innerHTML='<div class="notice error">'+e+'</div>';</script></body></html>
