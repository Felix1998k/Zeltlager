<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Zeltlager Bilder</title><link rel="stylesheet" href="/style.css"><style>.admin-login{position:fixed;top:18px;right:18px;z-index:5;display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 14px;border-radius:6px;background:rgba(255,255,255,.92);color:#17201b;text-decoration:none;font-weight:800;box-shadow:0 12px 36px rgba(0,0,0,.18)}.admin-login:hover{background:#fff}@media(max-width:620px){.admin-login{top:12px;right:12px;min-height:38px;padding:0 12px;font-size:14px}}</style></head><body><a class="admin-login" href="/admin">Admin Login</a><main class="hero"><section><h1>Zeltlager Bilder</h1><p>Alle Erinnerungen gesammelt als ZIP-Datei. Gib den persoenlichen Downloadcode ein; jeder Code funktioniert genau einmal.</p></section><form class="panel" method="post" action="/download"><h2>Bilder herunterladen</h2><p>Den Code bitte genau so eingeben, wie er ausgegeben wurde.</p><div id="message"></div><div class="form-row"><label for="code">Downloadcode</label><input id="code" name="code" type="text" autocomplete="one-time-code" required placeholder="z. B. 7A3F91C2B0"></div><button type="submit">ZIP herunterladen</button></form></main><script>const p=new URLSearchParams(location.search);const e=p.get('error');if(e)document.getElementById('message').innerHTML='<div class="notice error">'+e+'</div>';</script></body></html>
