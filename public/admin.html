<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin - Zeltlager Bilder</title><link rel="stylesheet" href="/style.css"></head><body><div class="topbar"><strong>Zeltlager Bilder - Admin</strong><form class="inline" method="post" action="/admin/logout"><button class="secondary" type="submit">Abmelden</button></form></div><main class="shell"><div id="lastCodes"></div><div class="grid"><section class="section"><h2>Bilder hochladen</h2><p>Mehrere Bilder koennen gleichzeitig ausgewaehlt werden.</p><form method="post" action="/admin/photos" enctype="multipart/form-data"><div class="form-row"><label for="photos">Bilddateien</label><input id="photos" name="photos" type="file" accept="image/*" multiple required></div><button type="submit">Bilder hochladen</button></form><table class="table"><thead><tr><th>Datei</th><th>Groesse</th><th></th></tr></thead><tbody id="photosBody"></tbody></table></section><section class="section"><h2>Einmalcodes</h2><p>Neue Codes werden nur direkt nach dem Erstellen im Klartext angezeigt.</p><form method="post" action="/admin/codes"><div class="form-row"><label for="amount">Anzahl</label><input id="amount" name="amount" type="number" min="1" max="200" value="10"></div><div class="form-row"><label for="label">Notiz</label><input id="label" name="label" type="text" placeholder="z. B. Gruppe A oder Elternabend"></div><button type="submit">Codes erstellen</button></form><div style="margin-bottom: 12px;"><a href="/admin/export-codes" class="button">Codes als CSV herunterladen</a></div><table class="table"><thead><tr><th>Notiz</th><th>Status</th><th>Erstellt</th><th></th></tr></thead><tbody id="codesBody"></tbody></table></section></div></main><script>function b(n){if(!n)return'0 B';const u=['B','KB','MB','GB'];const i=Math.min(Math.floor(Math.log(n)/Math.log(1024)),u.length-1);return(n/Math.pow(1024,i)).toFixed(i?1:0)+' '+u[i]}function d(v){return new Date(v).toLocaleString('de-DE')}async function s(){const st=await fetch('/admin/state').then(r=>r.json());document.getElementById('photosBody').innerHTML=st.photos.map(p=>'<tr><td>'+p.originalName+'<div class="meta">'+d(p.uploadedAt)+'</div></td><td>'+b(p.size)+'</td><td><form class="inline" method="post" action="/admin/photos/'+p.id+'/delete"><button class="danger" type="submit">Loeschen</button></form></td></tr>').join('')||'<tr><td colspan="3" class="meta">Noch keine Bilder hochgeladen.</td></tr>';document.getElementById('codesBody').innerHTML=st.codes.map(c=>'<tr><td>'+(c.label||'-')+'</td><td>'+(c.usedAt?'Benutzt':'Frei')+'</td><td>'+d(c.createdAt)+'</td><td>'+(c.usedAt?'':' <form class="inline" method="post" action="/admin/codes/'+c.id+'/delete"><button class="danger" type="submit">Loeschen</button></form>')+'</td></tr>').join('')||'<tr><td colspan="4" class="meta">Noch keine Codes erstellt.</td></tr>'}async function l(){const r=await fetch('/admin/last-codes').then(r=>r.json());if(!r.codes.length)return;document.getElementById('lastCodes').innerHTML='<section class="section" style="margin-bottom:18px"><h2>Neu erstellte Codes</h2><p>Diese Codes jetzt sichern oder ausdrucken. Danach werden sie nicht mehr im Klartext angezeigt.</p><div class="code-list">'+r.codes.map(c=>'<div class="code">'+c+'</div>').join('')+'</div></section>'}l();s();</script></body></html>
